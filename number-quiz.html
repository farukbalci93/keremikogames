*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#7EC8E3 0%,#B8E4F9 60%,#dff0fb 100%);position:fixed;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

/* ── BG ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.sun{position:absolute;top:26px;right:34px;width:70px;height:70px;background:radial-gradient(circle,#FFE066,#FFB700);border-radius:50%;box-shadow:0 0 40px 16px rgba(255,220,50,.35);animation:sunPulse 3s ease-in-out infinite;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 40px 16px rgba(255,220,50,.3)}50%{box-shadow:0 0 60px 28px rgba(255,220,50,.5)}}
.cloud{position:absolute;background:white;border-radius:50px;opacity:.82;animation:drift linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:110px;height:36px;top:68px;left:-120px;animation-duration:22s;}
.c1::before{width:54px;height:54px;top:-28px;left:16px;}
.c1::after{width:38px;height:38px;top:-18px;left:52px;}
.c2{width:85px;height:28px;top:128px;left:-95px;animation-duration:30s;animation-delay:-12s;opacity:.68;}
.c2::before{width:42px;height:42px;top:-22px;left:12px;}
.c2::after{width:28px;height:28px;top:-14px;left:42px;}
.c3{width:95px;height:32px;top:42px;left:-105px;animation-duration:38s;animation-delay:-6s;opacity:.55;}
.c3::before{width:48px;height:48px;top:-26px;left:14px;}
.c3::after{width:32px;height:32px;top:-16px;left:47px;}
@keyframes drift{from{transform:translateX(-230px)}to{transform:translateX(calc(100vw + 230px))}}
.grass{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(180deg,#4CAF50 0%,#357a38 100%);border-radius:50% 50% 0 0/16px 16px 0 0;}

.floaters{position:fixed;inset:0;pointer-events:none;z-index:1;}
.floater{position:absolute;font-weight:900;opacity:.09;animation:floatUp linear infinite;color:#2c3e50;}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0);opacity:0}10%{opacity:.09}90%{opacity:.09}100%{transform:translateY(-20vh) rotate(360deg);opacity:0}}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .4s,transform .4s;padding:14px;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.95);}

.mode-btns{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center;}
.mode-btn{padding:18px 32px;font-family:'Nunito',sans-serif;font-size:clamp(17px,4.5vw,24px);font-weight:900;color:white;border:none;border-radius:22px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 6px 0 rgba(0,0,0,.2),0 8px 28px rgba(0,0,0,.12);transition:transform .1s,box-shadow .1s;min-width:130px;}

.mode-btn.numbers{background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
.mode-btn.letters{background:linear-gradient(135deg,#4ECDC4,#74b9ff);}
.mode-btn.count{background:linear-gradient(135deg,#FFB347,#ff6b9d);}
.mode-btn.add{background:linear-gradient(135deg,#51CF66,#00b894);}
.mode-btn.sub{background:linear-gradient(135deg,#FF6B6B,#ee5a24);}
.mode-btn.mul{background:linear-gradient(135deg,#a29bfe,#6c5ce7);}
.mode-btn.div{background:linear-gradient(135deg,#fd79a8,#e84393);}
.mode-btn .bi{font-size:clamp(26px,7vw,40px);}
.signature{font-family:'Caveat',cursive;font-size:clamp(19px,4.8vw,27px);color:rgba(15,45,90,.78);text-shadow:0 2px 10px rgba(255,255,255,.7),0 1px 0 rgba(255,255,255,.5);margin-top:22px;letter-spacing:.5px;animation:sigFade 3s ease-in-out infinite alternate;}

.opt-btn{height:clamp(80px,18vw,110px);border:none;border-radius:18px;font-family:'Nunito',sans-serif;font-size:clamp(24px,7vw,48px);font-weight:900;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;width:100%;}

.opt-btn.c1{background:linear-gradient(135deg,#4ECDC4,#00b894);color:white;box-shadow:0 5px 0 #007a60;}
.opt-btn.c2{background:linear-gradient(135deg,#FFE66D,#f9ca24);color:#5f4000;box-shadow:0 5px 0 #c18e00;}
.opt-btn.c3{background:linear-gradient(135deg,#74b9ff,#0984e3);color:white;box-shadow:0 5px 0 #0660ae;}
.opt-btn.c4{background:linear-gradient(135deg,#fd79a8,#e84393);color:white;box-shadow:0 5px 0 #a01e68;}

@keyframes correctPop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ── DRAW ── */
#drawScreen{gap:8px;justify-content:flex-start;padding-top:44px;}
.draw-card{background:rgba(255,255,255,.93);border-radius:26px;padding:12px 14px;width:92%;max-width:400px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.12);}
.draw-title{font-size:clamp(15px,4vw,21px);font-weight:900;color:#2c3e50;margin-bottom:1px;}
.draw-hint{font-size:clamp(10px,2.6vw,13px);color:#bbb;font-weight:700;margin-bottom:8px;}
.canvas-wrap{position:relative;margin:0 auto;border-radius:18px;overflow:hidden;background:#f5f6ff;touch-action:none;border:3px solid rgba(150,150,200,.18);}
#guideCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#drawCanvas{display:block;width:100%;touch-action:none;}





.ok-btn{margin-top:10px;padding:13px 44px;background:linear-gradient(135deg,#51CF66,#2ecc71);color:white;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:clamp(15px,4vw,21px);font-weight:900;cursor:pointer;box-shadow:0 5px 0 #1e9e4e,0 8px 18px rgba(81,207,102,.4);letter-spacing:1px;}

.clear-btn{margin-top:7px;padding:9px 26px;background:linear-gradient(135deg,#fd79a8,#e84393);color:white;border:none;border-radius:30px;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 3px 0 #a01e68;}
.clear-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #a01e68;}

/* ── FX ── */
.sparkle{position:fixed;pointer-events:none;animation:sparkleAnim 1.5s ease-out forwards;z-index:999;}
@keyframes sparkleAnim{0%{transform:scale(0) rotate(0);opacity:1}50%{transform:scale(1.5) rotate(180deg);opacity:1}100%{transform:scale(0) rotate(360deg) translateY(-60px);opacity:0}}
</style>

    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
    o.start();o.stop(ctx.currentTime+.4);
  }catch(e){}
}

function playTryAgain(){
  try{
    const ctx=getAC();
    [[440,0],[380,.15]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const s=ctx.currentTime+t;
      g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.2,s+.05);
      g.gain.exponentialRampToValueAtTime(.001,s+.3);
      o.start(s);o.stop(s+.35);
    });
  }catch(e){}
}

function speak(text){
  fetch('/.netlify/functions/tts', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text})
  })
  .then(r => r.json())
  .then(data => {
    if(!data.audioContent) return;
    const audio = new Audio('data:audio/mp3;base64,' + data.audioContent);
    audio.play();
  })
  .catch(() => {
    // Fallback to browser TTS if API fails
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.82; u.pitch=1.4;
    window.speechSynthesis.speak(u);
  });
}

// ─── POOL ───────────────────────────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getNext(){
  if(poolIdx>=pool.length){
    // reshuffle but avoid repeating last item at start
    const last=pool[pool.length-1];
    pool=shuffle([...pool]);
    if(pool.length>1&&pool[0]===last){pool.push(pool.shift());}
    poolIdx=0;
  }
  return pool[poolIdx++];
}

function startMode(m){
  getAC();
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance('');
    u.volume=0;u.rate=1;

  mode=m;streak=0;

  } else if(mode==='mul'){

  } else if(mode==='div'){
    loadDivQuestion();
  } else if(mode==='count'){
    countPool=shuffle([...NUMBERS]);
    countPoolIdx=0;
    loadCountQuestion();
  } else {
    pool=mode==='numbers'?shuffle([...NUMBERS]):shuffle([...LETTERS]);
    poolIdx=0;
    loadQuestion();
  }
}

function initCanvas(char){
  const wrap=document.getElementById('canvasWrap');
  const size=Math.min(wrap.clientWidth||250,268);
  canvasW=canvasH=size;
  const dc=document.getElementById('drawCanvas');
  const gc=document.getElementById('guideCanvas');
  dc.width=gc.width=size;dc.height=gc.height=size;
  wrap.style.height=size+'px';
  drawCtx=dc.getContext('2d');guideCtx=gc.getContext('2d');

  // Draw ghost guide
  guideCtx.clearRect(0,0,size,size);
  const fs=size*(mode==='numbers'||mode==='count'?0.78:0.70);
  guideCtx.font=`900 ${fs}px Nunito`;
  guideCtx.textAlign='center';guideCtx.textBaseline='middle';
  guideCtx.fillStyle='rgba(150,150,220,0.22)';
  guideCtx.fillText(char,size/2,size/2);
  guideCtx.strokeStyle='rgba(120,120,210,0.40)';
  guideCtx.lineWidth=2;guideCtx.setLineDash([7,5]);
  guideCtx.strokeText(char,size/2,size/2);
  guideCtx.setLineDash([]);

  drawCtx.clearRect(0,0,size,size);
  drawnPixels=new Set();isDrawing=false;

  dc.ontouchstart=e=>{e.preventDefault();isDrawing=true;const p=getPos(e,dc);drawStart(p.x,p.y);};
  dc.ontouchmove=e=>{e.preventDefault();if(!isDrawing)return;const p=getPos(e,dc);drawMove(p.x,p.y);};
  dc.ontouchend=e=>{e.preventDefault();isDrawing=false;};
  dc.onmousedown=e=>{isDrawing=true;const p=getPos(e,dc);drawStart(p.x,p.y);};
  dc.onmousemove=e=>{if(!isDrawing)return;const p=getPos(e,dc);drawMove(p.x,p.y);};
  dc.onmouseup=()=>{isDrawing=false;};
}

function getPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

function drawStart(x,y){drawCtx.beginPath();drawCtx.moveTo(x,y);}
function drawMove(x,y){
  drawCtx.lineTo(x,y);
  drawCtx.strokeStyle='#FF6B6B';drawCtx.lineWidth=canvasW*.068;
  drawCtx.lineCap='round';drawCtx.lineJoin='round';
  drawCtx.stroke();drawCtx.beginPath();drawCtx.moveTo(x,y);
  const r=Math.ceil(canvasW*.034);
  for(let dx=-r;dx<=r;dx+=3)for(let dy=-r;dy<=r;dy+=3)
    if(dx*dx+dy*dy<=r*r){const px=Math.round(x+dx),py=Math.round(y+dy);
      if(px>=0&&px<canvasW&&py>=0&&py<canvasH)drawnPixels.add(px+','+py);}
}

function clearDraw(){
  drawCtx.clearRect(0,0,canvasW,canvasH);
  drawnPixels=new Set();
}

  playDing();createCenterSparkles();
  setTimeout(()=>nextQuestion(),900);
}

    btn.classList.add('wrong');playWrong();
    btn.onclick=null;
    setTimeout(()=>{btn.classList.remove('wrong');btn.onclick=()=>onAddSelect(btn,selected,correct);},650);
  }
}

function nextQuestion(){
  if(mode==='count') loadCountQuestion();
  else loadQuestion();
}
